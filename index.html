<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #f8cdda, #1d1e22);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 20px;
      text-align: center;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid rgba(255,255,255,0.3);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .bio {
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .card {
      display: block;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 16px;
      margin: 12px 0;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-weight: 500;
      transition: 0.25s;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.15);
    }

    footer {
      margin-top: 30px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="avatar" src="avatar.jpg" alt="avatar" />

    <h1>Han Sun</h1>
    <p class="bio">Robotics · Reinforcement Learning · Autonomous Driving</p>

    <a class="card" href="#" target="_blank">📄 Publications</a>
    <a class="card" href="#" target="_blank">🚀 Projects</a>
    <a class="card" href="#" target="_blank">🧠 Blog</a>
    <a class="card" href="#" target="_blank">📬 Contact Me</a>

    <footer>© 2026 Han Sun</footer>
  </div>
</body>
</html>
